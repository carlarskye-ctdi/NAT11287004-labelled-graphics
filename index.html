    background-position: center;
    background-repeat: no-repeat;
    transition: opacity 0.65s ease;
    opacity: 1;
  }
  .bg-layer.fade-out { opacity: 0; }

  .bg-overlay {
    position: absolute;
    inset: 0;
    background: 
      linear-gradient(105deg, rgba(6,3,20,0.35) 0%, rgba(20,8,50,0.35) 40%, rgba(6,3,20,0.35) 100%);
    z-index: 2;
  }

  .content {
    position: relative;
    z-index: 3;
    display: flex;
    flex-direction: column;
    width: 100%;
    height: 100%;
    padding: clamp(0.8rem, 3vh, 1.5rem) clamp(0.8rem, 3vw, 1.5rem);
    gap: clamp(0.5rem, 2vh, 1rem);
  }

  .progress-bar-wrap {
    width: 100%;
    height: clamp(2px, 0.5vh, 3px);
    background: var(--white-10);
    border-radius: 3px;
    overflow: hidden;
    flex-shrink: 0;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
    transition: width 0.5s ease;
    width: 0%;
  }

  /* TOPICS — now LEFT-aligned */
  .topics {
    display: flex;
    flex-direction: column;
    gap: clamp(0.4rem, 1.5vh, 0.9rem);
    align-items: flex-start;  /* changed from flex-end */
    width: 100%;
    flex-grow: 1;
    justify-content: center;
    position: relative;
    overflow-y: auto;
    overflow-x: hidden;
    padding-left: 2px;
  }
  .topic-row {
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: flex-start;  /* changed from flex-end */
    width: 100%;
    position: relative;
    min-height: auto;
    flex-shrink: 0;
  }
  .topic-btn {
    display: flex;
    align-items: center;
    background: none;
    border: none;
    padding: 0;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    position: relative;
    z-index: 10;
    margin-right: auto;  /* changed from margin-left: auto */
    flex-shrink: 0;
    order: 1;  /* button first in flex order */
  }
  .plus-circle {
    flex-shrink: 0;
    width: clamp(32px, 5vw, 44px);
    height: clamp(32px, 5vw, 44px);
    border-radius: 50%;
    background: var(--accent);
    border: 2px solid var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(1.1rem, 2vw, 1.5rem);
    line-height: 1;
    color: var(--white);
    font-weight: 300;
    transition: transform 0.32s cubic-bezier(0.4,0,0.2,1),
                background 0.22s,
                border-color 0.22s,
                box-shadow 0.22s;
    user-select: none;
  }
  .topic-btn:hover .plus-circle {
    box-shadow: 0 0 0 clamp(4px, 1vw, 7px) rgba(150,68,237,0.22);
    background: #7b28d8;
    border-color: #7b28d8;
  }
  .topic-btn.active .plus-circle {
    transform: rotate(45deg);
    background: var(--white);
    border-color: var(--white);
    color: var(--accent);
    box-shadow: 0 0 0 clamp(4px, 1vw, 7px) rgba(150,68,237,0.22);
  }
  .topic-btn.visited:not(.active) .plus-circle {
    background: transparent;
    border-color: var(--accent);
    color: var(--accent);
    font-size: clamp(0.8rem, 1.5vw, 1.1rem);
  }
  .topic-label { display: none; }

  /* PANEL — now on the RIGHT side of button */
  .panel-wrap {
    position: absolute;
    left: calc(clamp(32px, 5vw, 44px) + 8px);  /* changed from right */
    top: 50%;
    transform: translateY(-50%);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.35s ease, transform 0.35s ease;
    max-width: calc(100% - clamp(40px, 8vw, 60px));
    z-index: 5;
    order: 2;  /* panel after button */
  }
  .panel-wrap.open {
    opacity: 1;
    pointer-events: auto;
    transform: translateY(-50%);
  }
  .panel {
    background: rgba(6,3,20,0.92);
    border: 1.5px solid var(--accent);
    border-radius: 8px;
    padding: clamp(0.4rem, 1.5vh, 0.7rem) clamp(0.6rem, 2vw, 1.2rem);
    backdrop-filter: blur(14px);
    display: inline-flex;
    align-items: center;
    white-space: normal;
    max-width: min(280px, 60vw);
    line-height: 1.4;
    box-shadow: 0 4px 24px rgba(150,68,237,0.18);
  }
  .panel-title {
    font-size: clamp(0.72rem, 1.8vw, 0.88rem);
    font-weight: 600;
    color: var(--white);
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
  }
  /* Arrow now points LEFT toward the button */
  .panel::after {
    content: '';
    position: absolute;
    left: -6px;  /* changed from right */
    top: 50%;
    transform: translateY(-50%);
    width: 0;
    height: 0;
    border-top: 6px solid transparent;
    border-bottom: 6px solid transparent;
    border-right: 6px solid var(--accent);  /* changed from border-left */
  }

  #tooltip {
    position: fixed;
    background: rgba(6,3,20,0.96);
    border: 1px solid var(--accent);
    color: var(--white-80);
    font-family: 'Calibri', 'Carlito', 'Trebuchet MS', Arial, sans-serif;
    font-size: clamp(0.65rem, 1.5vw, 0.78rem);
    white-space: nowrap;
    padding: 0.35rem 0.7rem;
    border-radius: 6px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.18s ease;
    z-index: 9999;
    transform: translateX(-50%);
  }
  #tooltip.visible { opacity: 1; }

  .status-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: clamp(0.4rem, 1.5vh, 0.8rem);
    border-top: 1px solid var(--white-10);
    flex-shrink: 0;
  }
  .status-count {
    font-family: 'Calibri', 'Carlito', 'Trebuchet MS', Arial, sans-serif;
    font-size: clamp(0.65rem, 1.5vw, 0.78rem);
    color: var(--white-55);
    letter-spacing: 0.04em;
  }
  .status-count b { color: var(--accent); font-weight: 600; }

  .topics::-webkit-scrollbar {
    width: 3px;
  }
  .topics::-webkit-scrollbar-track {
    background: transparent;
  }
  .topics::-webkit-scrollbar-thumb {
    background: var(--accent);
    border-radius: 3px;
  }
</style>
<base target="_blank">
</head>
<body>
<div id="tooltip">Tap the + to reveal the content.</div>
<div class="canvas">
  <div class="bg-layer" id="bgLayer"></div>
  <div class="bg-overlay"></div>
  <div class="content">
    <div>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="progressFill"></div>
      </div>
    </div>
    <div class="topics" id="topicList"></div>
    <div class="status-row">
      <div class="status-count"><b id="doneCount">0</b> / 5 explored</div>
    </div>
  </div>
</div>
<script>
const TOPICS = [
  { label: "Understanding the concept of digital presence and its importance for brands", tag: "Concept: Token prediction" },
  { label: "Investigating and defining a target market to guide digital strategy", tag: "Technique: Role-Task-Format-Constraint" },
  { label: "Analysing a brand’s current digital presence to identify strengths and gaps", tag: "Skill: Iterative refinement" },
  { label: "Planning AI-driven improvements to enhance visibility and engagement", tag: "Risk: Hallucination & bias" },
  { label: "Implementing strategies to optimise a brand’s digital presence using AI tools", tag: "Practice: Accountability & transparency" }
];

const list          = document.getElementById('topicList');
const bgLayer       = document.getElementById('bgLayer');
const progressFill  = document.getElementById('progressFill');
const doneCount     = document.getElementById('doneCount');
const tooltip       = document.getElementById('tooltip');

let openIndex = null;
const visited = new Set();

function showTooltip(circle) {
  const rect = circle.getBoundingClientRect();
  tooltip.style.left = (rect.left + rect.width / 2) + 'px';
  tooltip.style.top  = (rect.top - 40) + 'px';
  tooltip.classList.add('visible');
}
function hideTooltip() { tooltip.classList.remove('visible'); }

function updateProgress() {
  progressFill.style.width = (visited.size / TOPICS.length * 100) + '%';
  doneCount.textContent = visited.size;
}

const btns = [], panels = [];

TOPICS.forEach((t, i) => {
  const row = document.createElement('div');
  row.className = 'topic-row';

  const btn = document.createElement('button');
  btn.className = 'topic-btn';
  btn.setAttribute('aria-expanded', 'false');
  btn.dataset.idx = i;
  btn.innerHTML = `
    <span class="topic-label">${t.label}</span>
    <div class="plus-circle" aria-hidden="true">+</div>
  `;

  const circle = btn.querySelector('.plus-circle');
  circle.addEventListener('mouseenter', () => showTooltip(circle));
  circle.addEventListener('mouseleave', hideTooltip);

  const panelWrap = document.createElement('div');
  panelWrap.className = 'panel-wrap';
  panelWrap.innerHTML = `
    <div class="panel">
      <span class="panel-title">${t.label}</span>
    </div>
  `;

  btn.addEventListener('click', () => {
    const isOpen = openIndex === i;
    hideTooltip();

    btns.forEach((b, j) => {
      b.classList.remove('active');
      b.setAttribute('aria-expanded', 'false');
      const c = b.querySelector('.plus-circle');
      c.textContent = '+';
      if (visited.has(j)) b.classList.add('visited'); else b.classList.remove('visited');
    });
    panels.forEach(p => p.classList.remove('open'));

    if (!isOpen) {
      openIndex = i;
      btn.classList.add('active');
      btn.classList.remove('visited');
      btn.setAttribute('aria-expanded', 'true');
      panelWrap.classList.add('open');
      if (!visited.has(i)) { visited.add(i); updateProgress(); }
    } else {
      openIndex = null;
      if (visited.has(i)) { btn.classList.add('visited'); }
    }
  });

  row.appendChild(btn);       /* button first (left) */
  row.appendChild(panelWrap); /* panel second (right of button) */
  list.appendChild(row);

  btns.push(btn);
  panels.push(panelWrap);
});
</script>
</body>
</html>
